{% extends "base.html" %}

{% block title %}Edit {{ file.file_number }} - Vigilance FMS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="bi bi-pencil"></i> Edit File: {{ file.file_number }}</h2>
    </div>
</div>

<form method="POST" action="{{ url_for('files.edit_file', file_number=file.file_number) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-info-circle"></i> File Details</h5>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="file_number" class="form-label">File Number</label>
                    <input type="text" class="form-control" id="file_number" value="{{ file.file_number }}" disabled>
                </div>
                
                <div class="col-md-4">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" name="category" 
                           value="{{ file.category or '' }}">
                </div>
                
                <div class="col-md-4">
                    <label for="type_of_file" class="form-label">Type of File</label>
                    <input type="text" class="form-control" id="type_of_file" name="type_of_file" 
                           value="{{ file.type_of_file or '' }}">
                </div>
                
                <div class="col-md-4">
                    <label for="file_type" class="form-label">File Type</label>
                    <select class="form-select" id="file_type" name="file_type">
                        <option value="">Select Type</option>
                        <option value="Physical" {% if file.file_type == 'Physical' %}selected{% endif %}>Physical</option>
                        <option value="E-Office" {% if file.file_type == 'E-Office' %}selected{% endif %}>E-Office</option>
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="">Select Status</option>
                        <option value="With Clerk" {% if file.status == 'With Clerk' %}selected{% endif %}>With Clerk</option>
                        <option value="Submitted" {% if file.status == 'Submitted' %}selected{% endif %}>Submitted</option>
                        <option value="Despatched" {% if file.status == 'Despatched' %}selected{% endif %}>Despatched</option>
                        <option value="Closed" {% if file.status == 'Closed' %}selected{% endif %}>Closed</option>
                        <option value="Mailed & Despatched" {% if file.status == 'Mailed & Despatched' %}selected{% endif %}>Mailed & Despatched</option>
                        <option value="Parked" {% if file.status == 'Parked' %}selected{% endif %}>Parked</option>
                        <option value="Stock File" {% if file.status == 'Stock File' %}selected{% endif %}>Stock File</option>
                        <option value="Attached" {% if file.status == 'Attached' %}selected{% endif %}>Attached</option>
                        <option value="Speak" {% if file.status == 'Speak' %}selected{% endif %}>Speak</option>
                        <option value="Handed Over" {% if file.status == 'Handed Over' %}selected{% endif %}>Handed Over</option>
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label for="file_year" class="form-label">File Year</label>
                    <input type="text" class="form-control" id="file_year" name="file_year" 
                           value="{{ file.file_year or '' }}" placeholder="e.g., 2025">
                </div>
                
                <div class="col-12">
                    <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="subject" name="subject" rows="2" required>{{ file.subject or '' }}</textarea>
                </div>
                
                <div class="col-12">
                    <label for="details_of_file" class="form-label">Details of File</label>
                    <textarea class="form-control" id="details_of_file" name="details_of_file" rows="3">{{ file.details_of_file or '' }}</textarea>
                </div>
                
                <div class="col-md-4">
                    <label for="institution_type" class="form-label">Institution Type</label>
                    <input type="text" class="form-control" id="institution_type" name="institution_type" 
                           value="{{ file.institution_type or '' }}">
                </div>
                
                <div class="col-md-4">
                    <label for="institution_name" class="form-label">Institution Name</label>
                    <input type="text" class="form-control" id="institution_name" name="institution_name" 
                           value="{{ file.institution_name or '' }}">
                </div>
                
                <div class="col-md-4">
                    <label for="disciplinary_action" class="form-label">Disciplinary Action</label>
                    <select class="form-select" id="disciplinary_action" name="disciplinary_action">
                        <option value="">Select</option>
                        <option value="Yes" {% if file.disciplinary_action == 'Yes' %}selected{% endif %}>Yes</option>
                        <option value="No" {% if file.disciplinary_action == 'No' %}selected{% endif %}>No</option>
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label for="follow_up_date" class="form-label">Follow Up Date</label>
                    <input type="date" class="form-control" id="follow_up_date" name="follow_up_date"
                           value="{{ file.follow_up_date or '' }}">
                </div>
                
                <div class="col-12">
                    <label for="remarks" class="form-label">Remarks</label>
                    <textarea class="form-control" id="remarks" name="remarks" rows="2">{{ file.remarks or '' }}</textarea>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Physical Location -->
    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
            <h5 class="mb-0"><i class="bi bi-geo-alt"></i> Physical Location</h5>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="almirah" class="form-label">Almirah</label>
                    <input type="text" class="form-control" id="almirah" name="almirah" 
                           value="{{ file.almirah or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="rack" class="form-label">Rack</label>
                    <input type="text" class="form-control" id="rack" name="rack" 
                           value="{{ file.rack or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="row" class="form-label">Row</label>
                    <input type="text" class="form-control" id="row" name="row" 
                           value="{{ file.row or '' }}">
                </div>
            </div>
        </div>
    </div>
    
    <!-- E-Office Migration -->
    <div class="card mb-4">
        <div class="card-header bg-info text-white">
            <h5 class="mb-0"><i class="bi bi-cloud-upload"></i> E-Office Migration</h5>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="migrated_to_eoffice" class="form-label">Migrated to E-Office</label>
                    <select class="form-select" id="migrated_to_eoffice" name="migrated_to_eoffice">
                        <option value="">Select</option>
                        <option value="Yes" {% if file.migrated_to_eoffice == 'Yes' %}selected{% endif %}>Yes</option>
                        <option value="No" {% if file.migrated_to_eoffice == 'No' %}selected{% endif %}>No</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="eoffice_file_number" class="form-label">E-Office File Number</label>
                    <input type="text" class="form-control" id="eoffice_file_number" name="eoffice_file_number" 
                           value="{{ file.eoffice_file_number or '' }}">
                </div>
                <div class="col-md-4">
                    <label for="original_file_number" class="form-label">Original File Number</label>
                    <input type="text" class="form-control" id="original_file_number" name="original_file_number" 
                           value="{{ file.original_file_number or '' }}">
                </div>
            </div>
        </div>
    </div>
    
    <div class="d-flex justify-content-between">
        <a href="{{ url_for('files.view_file', file_number=file.file_number) }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Cancel
        </a>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Save Changes
        </button>
    </div>
</form>
{% endblock %}
