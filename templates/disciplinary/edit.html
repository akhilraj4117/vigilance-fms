{% extends "base.html" %}

{% block title %}Edit Disciplinary Action - Vigilance FMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pencil"></i> Edit Disciplinary Action</h2>
    <a href="{{ url_for('disciplinary.view_action', id=action.id) }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Details
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form action="{{ url_for('disciplinary.edit_action', id=action.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <!-- Employee Information -->
            <h5 class="mb-3"><i class="bi bi-person"></i> Employee Information</h5>
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <label for="pen" class="form-label">PEN <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="pen" name="pen" 
                           value="{{ action.pen or '' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="employee_name" class="form-label">Employee Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="employee_name" name="employee_name" 
                           value="{{ action.employee_name }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="designation" class="form-label">Designation</label>
                    <input type="text" class="form-control" id="designation" name="designation" 
                           value="{{ action.designation or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="institution" class="form-label">Institution</label>
                    <input type="text" class="form-control" id="institution" name="institution" 
                           value="{{ action.institution or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="department" class="form-label">Department</label>
                    <input type="text" class="form-control" id="department" name="department" 
                           value="{{ action.department or '' }}">
                </div>
            </div>

            <!-- Action Details -->
            <h5 class="mb-3"><i class="bi bi-file-earmark-text"></i> Action Details</h5>
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <label for="action_type" class="form-label">Action Type <span class="text-danger">*</span></label>
                    <select class="form-select" id="action_type" name="action_type" required>
                        <option value="">Select Action Type</option>
                        {% for at in ['Warning', 'Censure', 'Fine', 'Recovery', 'Withholding Increment', 'Reduction in Rank', 'Compulsory Retirement', 'Removal', 'Dismissal', 'Suspension'] %}
                        <option value="{{ at }}" {% if action.action_type == at %}selected{% endif %}>{{ at }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="is_major" class="form-label">Penalty Type</label>
                    <select class="form-select" id="is_major" name="is_major">
                        <option value="No" {% if action.is_major == 'No' %}selected{% endif %}>Minor Penalty</option>
                        <option value="Yes" {% if action.is_major == 'Yes' %}selected{% endif %}>Major Penalty</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="action_date" class="form-label">Action Date</label>
                    <input type="date" class="form-control" id="action_date" name="action_date" 
                           value="{{ action.action_date|format_date_html }}">
                </div>
            </div>

            <!-- File Reference -->
            <h5 class="mb-3"><i class="bi bi-folder"></i> File Reference</h5>
            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <label for="file_no" class="form-label">File Number</label>
                    <input type="text" class="form-control" id="file_no" name="file_no" 
                           value="{{ action.file_no or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="order_no" class="form-label">Order Number</label>
                    <input type="text" class="form-control" id="order_no" name="order_no" 
                           value="{{ action.order_no or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="order_date" class="form-label">Order Date</label>
                    <input type="date" class="form-control" id="order_date" name="order_date" 
                           value="{{ action.order_date|format_date_html }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        {% for s in ['Pending', 'Implemented', 'Revoked', 'Modified', 'Under Appeal'] %}
                        <option value="{{ s }}" {% if action.status == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Details -->
            <h5 class="mb-3"><i class="bi bi-journal-text"></i> Details</h5>
            <div class="row mb-4">
                <div class="col-md-12 mb-3">
                    <label for="charges" class="form-label">Charges</label>
                    <textarea class="form-control" id="charges" name="charges" rows="3">{{ action.charges or '' }}</textarea>
                </div>
                <div class="col-md-12 mb-3">
                    <label for="remarks" class="form-label">Remarks</label>
                    <textarea class="form-control" id="remarks" name="remarks" rows="2">{{ action.remarks or '' }}</textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('disciplinary.view_action', id=action.id) }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Update Action
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Auto-fill employee details when PEN is changed
    document.getElementById('pen').addEventListener('blur', function() {
        const pen = this.value.trim();
        if (pen) {
            fetch(`/disciplinary/api/employee/${pen}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.employee) {
                        if (confirm('Employee found. Update details?')) {
                            document.getElementById('employee_name').value = data.employee.name || '';
                            document.getElementById('designation').value = data.employee.designation || '';
                            document.getElementById('institution').value = data.employee.institution || '';
                            document.getElementById('department').value = data.employee.department || '';
                        }
                    }
                })
                .catch(error => console.log('Employee lookup failed:', error));
        }
    });
</script>
{% endblock %}
