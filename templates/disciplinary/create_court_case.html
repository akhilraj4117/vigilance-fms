{% extends "base.html" %}

{% block title %}New Court Case - Vigilance FMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-bank"></i> New Court Case</h2>
    <a href="{{ url_for('reports.court_cases') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to List
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form action="{{ url_for('disciplinary.create_court_case') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="row">
                <div class="col-md-6">
                    <h5 class="mb-3"><i class="bi bi-info-circle"></i> Case Information</h5>
                    
                    <div class="mb-3">
                        <label for="case_number" class="form-label">Case Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="case_number" name="case_number" required
                               placeholder="e.g., WP(C) 12345/2024">
                    </div>

                    <div class="mb-3">
                        <label for="case_type" class="form-label">Case Type</label>
                        <select class="form-select" id="case_type" name="case_type">
                            <option value="">-- Select Type --</option>
                            <option value="Writ Petition (Civil)">Writ Petition (Civil)</option>
                            <option value="Writ Petition (Criminal)">Writ Petition (Criminal)</option>
                            <option value="Original Petition">Original Petition</option>
                            <option value="Appeal">Appeal</option>
                            <option value="Review Petition">Review Petition</option>
                            <option value="Contempt">Contempt</option>
                            <option value="Labour Court">Labour Court</option>
                            <option value="Tribunal">Tribunal</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="court_name" class="form-label">Court Name</label>
                        <select class="form-select" id="court_name" name="court_name">
                            <option value="">-- Select Court --</option>
                            <option value="High Court of Kerala">High Court of Kerala</option>
                            <option value="Supreme Court">Supreme Court of India</option>
                            <option value="Kerala Administrative Tribunal">Kerala Administrative Tribunal (KAT)</option>
                            <option value="District Court">District Court</option>
                            <option value="Labour Court">Labour Court</option>
                            <option value="Consumer Court">Consumer Court</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="filing_date" class="form-label">Filing Date</label>
                            <input type="date" class="form-control" id="filing_date" name="filing_date">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="next_hearing_date" class="form-label">Next Hearing Date</label>
                            <input type="date" class="form-control" id="next_hearing_date" name="next_hearing_date">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            <option value="Pending" selected>Pending</option>
                            <option value="Stayed">Stayed</option>
                            <option value="Disposed">Disposed</option>
                            <option value="Withdrawn">Withdrawn</option>
                            <option value="Transferred">Transferred</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <h5 class="mb-3"><i class="bi bi-people"></i> Parties</h5>
                    
                    <div class="mb-3">
                        <label for="petitioner" class="form-label">Petitioner</label>
                        <textarea class="form-control" id="petitioner" name="petitioner" rows="2"
                                  placeholder="Name of petitioner(s)"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="respondent" class="form-label">Respondent</label>
                        <textarea class="form-control" id="respondent" name="respondent" rows="2"
                                  placeholder="Name of respondent(s)"></textarea>
                    </div>

                    <h5 class="mb-3 mt-4"><i class="bi bi-briefcase"></i> Advocate Details</h5>

                    <div class="mb-3">
                        <label for="advocate_name" class="form-label">Government Advocate Name</label>
                        <input type="text" class="form-control" id="advocate_name" name="advocate_name">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="advocate_phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="advocate_phone" name="advocate_phone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="advocate_email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="advocate_email" name="advocate_email">
                        </div>
                    </div>
                </div>
            </div>

            <hr>

            <div class="row">
                <div class="col-md-6">
                    <h5 class="mb-3"><i class="bi bi-link-45deg"></i> Related Records</h5>

                    <div class="mb-3">
                        <label for="file_id" class="form-label">Related File</label>
                        <select class="form-select" id="file_id" name="file_id">
                            <option value="">-- Select File --</option>
                            {% for file in files %}
                            <option value="{{ file.id }}">{{ file.file_no }} - {{ file.subject[:50] }}...</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="employee_id" class="form-label">Related Employee</label>
                        <select class="form-select" id="employee_id" name="employee_id">
                            <option value="">-- Select Employee --</option>
                            {% for emp in employees %}
                            <option value="{{ emp.id }}">{{ emp.name }} ({{ emp.pen }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <h5 class="mb-3"><i class="bi bi-file-text"></i> Case Details</h5>

                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject/Prayer</label>
                        <textarea class="form-control" id="subject" name="subject" rows="3"
                                  placeholder="Brief description of the case subject or prayer"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="remarks" class="form-label">Remarks</label>
                        <textarea class="form-control" id="remarks" name="remarks" rows="2"></textarea>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Create Court Case
                </button>
                <a href="{{ url_for('reports.court_cases') }}" class="btn btn-secondary">
                    <i class="bi bi-x-lg"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
